{% extends "base.html" %}
{% block title %}Log in — easy-german{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1>Log in</h1>
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <form method="post" class="auth-form">
      <label>
        <span>Email</span>
        <input type="email" name="email" value="{{ email }}" autocomplete="email" required autofocus>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Log in</button>
    </form>
    <p class="auth-alt">No account yet? <a href="{{ url_for('signup') }}">Sign up</a></p>
  </div>
{% endblock %}
