{% extends "base.html" %}
{% block title %}Sign up — easy-german{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1>Create your account</h1>
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <form method="post" class="auth-form">
      <label>
        <span>Email</span>
        <input type="email" name="email" value="{{ email }}" autocomplete="email" required autofocus>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="new-password" minlength="8" required>
        <small>At least 8 characters.</small>
      </label>
      <button type="submit">Sign up</button>
    </form>
    <p class="auth-alt">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
{% endblock %}
